<body>
    <div id="ForeCast">
   <div id="sunMoon" class="forecast-criterias">
        <p>SUN AND MOON</p>
        <hr>
        <div id="sun">
        <div>
       <img src="assets/sunny.png" alt=""> 
       <div id="timeGap"></div>
        </div>
        <div>
            <div id="sunrise"></div>
            <div id="sunset"></div>
        </div>
        </div>
        <hr>
        <div id="moon">
        <div>
        <img src="assets/moon.png" alt=""> 
        <div id="moonphase"></div>
        </div>
        <div>
    <div id="moonrise"></div>
    <div id="moonset"></div>
        </div>
    </div>
    </div>

         <p>WEATHER CONDITION</p>
        <p id="currentTime"></p>
        </div>
                <hr>

        <div>
            <div>
                <img id="weatherIcon" src=""/>
                <div id="condition"></div>
            </div>
                
            <div>

            </div>

           <div>

            <div id="humidity"></div>
        </div> 
            <div>
                <p>UV Index</p>
                <div id="uv"></div>
            </div>
            <div>
                <p>Rain Chances</p>
                <div><img src="assets/drop.png" alt="drop" id="dropicon"/> <div id="chances-of-rain"></div></div>
            </div>
        </div>
    </div>
    </div>

    <div id="hourly-weathers">

    </div>
    </div>
